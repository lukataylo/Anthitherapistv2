openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reframe
    description: Cognitive reframing operations
  - name: reflect
    description: Reflection insight operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /reframe:
    post:
      operationId: reframeThought
      tags: [reframe]
      summary: Analyse and reframe a thought
      description: Takes a raw thought string and returns word-level cognitive analysis with reframe suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReframeRequest"
      responses:
        "200":
          description: Successful analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReframeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reflect:
    post:
      operationId: reflectOnSession
      tags: [reflect]
      summary: Generate an LLM insight for a completed reframing session
      description: Accepts the original thought, word analysis, and chosen reframes, then returns a narrative insight paragraph synthesising the session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectRequest"
      responses:
        "200":
          description: Successful insight generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /patterns:
    post:
      operationId: getPatterns
      tags: [patterns]
      summary: Generate AI pattern observations from history
      description: Accepts a category distribution summary and thought samples, then returns 2-3 natural-language pattern observations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatternsRequest"
      responses:
        "200":
          description: Successful pattern generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReframeRequest:
      type: object
      properties:
        thought:
          type: string
          description: The raw thought text to analyse
      required:
        - thought
    WordAnalysis:
      type: object
      properties:
        word:
          type: string
          description: The original word
        category:
          type: string
          enum: [neutral, belief, fear, absolute, self_judgment]
          description: Cognitive category of the word
        reframes:
          type: array
          items:
            type: string
          description: Possible reframe suggestions (only for significant words)
        hint:
          type: string
          nullable: true
          description: A softened hint for the word (only for significant words)
        fiftyFifty:
          type: array
          items:
            type: string
          description: Two options for 50/50 — one correct reframe and one decoy (only for significant words)
        explainer:
          type: string
          nullable: true
          description: Brief explanation of why this word is cognitively distorted
      required:
        - word
        - category
        - reframes
        - fiftyFifty
    ReframeResponse:
      type: object
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordAnalysis"
      required:
        - words
    ReflectRequest:
      type: object
      properties:
        thought:
          type: string
          description: The original thought text
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordAnalysis"
          description: Full word analysis from the reframe session
        reframedWords:
          type: object
          additionalProperties:
            type: string
          description: Map of word index (as string key) to chosen reframe
      required:
        - thought
        - words
        - reframedWords
    ReflectResponse:
      type: object
      properties:
        insight:
          type: string
          description: LLM-generated narrative insight paragraph for the session
      required:
        - insight
    PatternsRequest:
      type: object
      properties:
        categoryCounts:
          type: object
          description: Map of distortion category to total word count across all entries
          additionalProperties:
            type: number
        thoughtSamples:
          type: array
          description: Sample thoughts (up to 10) with their dominant distortion category
          items:
            type: object
            properties:
              thought:
                type: string
              dominantCategory:
                type: string
                enum: [belief, fear, absolute, self_judgment]
            required:
              - thought
              - dominantCategory
      required:
        - categoryCounts
        - thoughtSamples
    PatternsResponse:
      type: object
      properties:
        patterns:
          type: array
          items:
            type: string
          description: 2-3 natural-language pattern observations
      required:
        - patterns
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
